apply plugin: 'com.android.application'

def signingProperties = new Properties()
def signingPropertiesPath = System.getenv('CAT_DROP_KEYSTORE_PROPERTIES') ?:
        new File(System.getProperty('user.home'), '.catdrop/keystore.properties').absolutePath
def signingPropertiesFile = file(signingPropertiesPath)
if (signingPropertiesFile.exists()) {
    signingPropertiesFile.withInputStream { signingProperties.load(it) }
}

def signingSetting = { String propertyName, String environmentName ->
    System.getenv(environmentName) ?: signingProperties.getProperty(propertyName)
}
def releaseStoreFile = signingSetting('storeFile', 'CAT_DROP_KEYSTORE')
def releaseStorePassword = signingSetting('storePassword', 'CAT_DROP_STORE_PASSWORD')
def releaseKeyAlias = signingSetting('keyAlias', 'CAT_DROP_KEY_ALIAS')
def releaseKeyPassword = signingSetting('keyPassword', 'CAT_DROP_KEY_PASSWORD')
def releaseSigningReady = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword
def releaseArtifactRequested = gradle.startParameter.taskNames.any { taskName ->
    def normalized = taskName.toLowerCase()
    normalized.endsWith('assemblerelease') || normalized.endsWith('bundlerelease')
}
if (releaseArtifactRequested && !releaseSigningReady) {
    throw new GradleException("Release signing is not configured. Use the protected Cat Drop keystore properties file.")
}

android {
    namespace = "com.example.catdropevolution"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.catdrop.evolution2"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10
        versionName "2.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (releaseSigningReady) {
            release {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            if (releaseSigningReady) signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
